<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة حجز الكتاكيت</title>
    <style>
        /* إعدادات الصفحة الكاملة */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #eef2f3; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            padding: 20px;
        }

        .full-page-container { 
            width: 100%; 
            max-width: 900px; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; border-bottom: 3px solid #28a745; display: inline-block; width: 100%; padding-bottom: 10px; }

        .form-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        @media (max-width: 600px) { .form-section { grid-template-columns: 1fr; } }

        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: #28a745; }

        .items-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; 
            background: #f9f9f9; 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 25px;
        }

        .item-card { 
            background: white; 
            padding: 15px; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border: 1px solid #eee;
            gap: 10px;
        }

        .item-card span { font-weight: bold; color: #555; }
        .item-card input { 
            width: 100%; 
            text-align: center; 
            padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            font-size: 18px;
        }

        /* إلغاء الاقتراحات والأسهم */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .btn-submit { 
            width: 100%; 
            padding: 15px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .btn-submit:hover { background: #218838; transform: translateY(-2px); }

        .footer-links { text-align: center; margin-top: 20px; }
        .footer-links a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="full-page-container">
    <h2>حجز كتاكيت العيوطي 🐥</h2>
    
    <form id="booking-form" autocomplete="off">
        <div class="form-section">
            <div class="form-group">
                <label>الإسم:</label>
                <input type="text" id="user_name" required placeholder="الاسم ثلاثي">
            </div>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" id="user_phone" required placeholder="01xxxxxxxxx">
            </div>
        </div>

        <label style="font-weight: bold; margin-bottom: 10px; display: block;">الأصناف والكميات:</label>
        <div id="items-grid" class="items-grid">
            </div>

        <button type="submit" class="btn-submit">إرسال الحجز 🐣</button>
    </form>

    <div class="footer-links">
        <a href="admin.html" ←</a>
    </div>
</div>

<script>
    const categories = ["أبيض", "بلدي", "ساسو", "روزي", "بط مسكوفي", "بط بغال", "بط فرنساوي"];
    const grid = document.getElementById('items-grid');

    categories.forEach(cat => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
            <span>${cat}</span>
            <input type="number" class="item-qty" data-name="${cat}" 
                   placeholder=""  min="" 
                   autocomplete="one-time-code" readonly 
                   onfocus="this.removeAttribute('readonly');">
        `;
        grid.appendChild(card);
    });

    document.getElementById('booking-form').addEventListener('submit', function(e) {
        e.preventDefault();
        let details = "";
        let hasOrder = false;

        document.querySelectorAll('.item-qty').forEach(input => {
            const val = parseFloat(input.value);
            if(val > 0) {
                details += `${input.dataset.name}: ${val} \n`;
                hasOrder = true;
            }
        });

        if(!hasOrder) {
            alert("⚠️ يرجى تحديد كمية لصنف واحد على الأقل!");
            return;
        }

        const newBooking = {
            name: document.getElementById('user_name').value,
            phone: document.getElementById('user_phone').value,
            order: details,
            date: new Date().toLocaleString('ar-EG')
        };

        const allBookings = JSON.parse(localStorage.getItem('my_bookings') || '[]');
        allBookings.push(newBooking);
        localStorage.setItem('my_bookings', JSON.stringify(allBookings));

        alert('✅ تم تسجيل الحجز بنجاح!');
        this.reset();
        // إعادة وضع readonly لمنع الاقتراحات مستقبلاً
        document.querySelectorAll('.item-qty').forEach(i => i.setAttribute('readonly', true));
    });
</script>

</body>
</html>
