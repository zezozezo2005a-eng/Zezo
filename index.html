<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التوصيل الذكي | اطلب الآن</title>
    <style>
        /* إعدادات الـ CSS بتاعتك زي ما هي بدون تغيير */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 170vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #4a148c; font-size: 2rem; margin-bottom: 10px; }
        .header p { color: #666; font-size: 1.1rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, textarea { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; outline: none; }
        .price-display { grid-column: 1 / -1; background: #f1f8e9; border: 2px dashed #4caf50; padding: 15px; text-align: center; border-radius: 10px; margin-top: 10px; }
        .price-display span { color: #2e7d32; font-weight: bold; font-size: 1.3rem; }
        .btn-submit { grid-column: 1 / -1; background: #764ba2; color: white; padding: 15px; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        footer { text-align: center; margin-top: 20px; color: white; font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body>

<div>
    <div class="main-card">
        <div class="header">
            <h1> اطلب مشوارك الآن🛺</h1>
            <p> سجل بياناتك نجيلك للبيت 🌹</p>
        </div>

        <form id="orderForm">
            <div class="form-grid">
                <div class="input-group">
                    <label>اسمك </label>
                    <input type="text" id="custName" placeholder="مثلاً: أحمد محمد" required>
                </div>

                <div class="input-group">
                    <label>رقم الموبايل</label>
                    <input type="tel" id="custPhone" placeholder="01XXXXXXXXX" required>
                </div>

                <div class="input-group">
                    <label>عنوانك </label>
                    <input type="text" id="locFrom" placeholder="المنطقة، الشارع" required>
                </div>

                <div class="input-group">
                    <label> مكان التوصيل</label>
                    <input type="text" id="locTo" placeholder="المكان الذاهب إليه/رايح فين😁" required>
                </div>

                <div class="input-group" style="grid-column: 1 / -1;">
                    <label>ملاحظات للسائق</label>
                    <textarea id="orderNotes" rows="2" placeholder="أي تفاصيل إضافية..."></textarea>
                </div>

                <div class="price-display">
                    <p>الحالة:</p>
                    <span id="statusText">في انتظار إرسال طلبك ⏳</span>
                </div>

                <button type="submit" class="btn-submit">تأكيد طلب التوصيل</button>
            </div>
        </form>
    </div>
    <footer>© 2026 جميع الحقوق محفوظة</footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    // 1. إعدادات فايربيز (الخاصة بمشروعك)
    const firebaseConfig = {
        apiKey: "AIzaSyC7xpFIK463RYFcOUM1E7A5EIXcTGNJPmE",
        authDomain: "tuktuk-delivery-e06c0.firebaseapp.com",
        projectId: "tuktuk-delivery-e06c0",
        storageBucket: "tuktuk-delivery-e06c0.firebasestorage.app",
        messagingSenderId: "107492432729",
        appId: "1:107492432729:web:98675e2d0304dead840a48",
        measurementId: "G-MS7MBBJE22"
    };

    // تهيئة فايربيز
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();

        const now = new Date();
        const timeString = now.toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});

        // تجهيز بيانات الطلب
        const orderData = {
            time: timeString,
            name: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            from: document.getElementById('locFrom').value,
            to: document.getElementById('locTo').value,
            notes: document.getElementById('orderNotes').value || "لا توجد",
            taken: false, // لم يتم تعيينه لسائق بعد
            status: 'waiting', // حالة الانتظار
            notified: false // للسائق مستقبلاً
        };

        // 2. إرسال الطلب لفايربيز
        const newOrderRef = db.ref('orders').push(); // إنشاء مكان جديد في "orders"
        newOrderRef.set(orderData)
        .then(() => {
            document.getElementById('statusText').innerText = "تم الإرسال بنجاح! جاري البحث عن سائق ✅";
            alert("تم إرسال طلبك بنجاح!");
            document.getElementById('orderForm').reset();
        })
        .catch((error) => {
            alert("عذراً، حدث خطأ أثناء الإرسال: " + error.message);
        });
    };
</script>

</body>
</html>
